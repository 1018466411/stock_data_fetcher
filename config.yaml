api:
  domain: "https://data.diemeng.chat"
  api_key: "" # 推荐在界面上配置，配置后会保存到 .env 文件中

db_type: "clickhouse"

clickhouse:
  host: "clickhouse"
  port: 9000
  user: "default"
  password: ""
  database: "stock_data"

threads:
  max_workers: 10

tables:
  history_1m:
    name: "stock_history_1m"
    fields:
      stock_code: "stock_code"
      trade_time: "trade_time"
      open: "open"
      close: "close"
      high: "high"
      low: "low"
      volume: "volume"
      amount: "amount"
  history_5m:
