{% extends "layout.html" %}

{% block title %}表结构配置 - Stock Data Fetcher{% endblock %}

{% block content %}
<div id="app">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 mb-0 text-gray-800">数据库表结构映射配置</h2>
        <button class="btn btn-primary shadow-sm" @click="saveConfig" :disabled="saving">
            <span v-if="saving" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            <i v-else class="bi bi-save me-2"></i>保存配置
        </button>
    </div>

    <div class="alert alert-info shadow-sm border-0 mb-4">
        <i class="bi bi-info-circle me-2"></i>
        修改表名或字段名时，系统将自动尝试执行 <code>ALTER TABLE</code> 操作以重命名已有表或字段（如果表已存在）。
    </div>

    <div v-if="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3 text-muted">加载配置中...</p>
    </div>

    <div class="row" v-else>
        <div class="col-12 mb-4" v-for="(table, key) in tables" :key="key">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 d-flex align-items-center">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-table text-primary me-2"></i>配置: [[ key ]]</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-2 col-form-label fw-bold">表名称 (Table Name)</label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" v-model="table.name">
                        </div>
                    </div>
                    <hr>
                    <h6 class="fw-bold mb-3">字段映射 (Field Mappings)</h6>
                    <div class="row g-3">
                        <div class="col-md-4 col-sm-6" v-for="(dbField, baseField) in table.fields" :key="baseField">
                            <div class="input-group input-group-sm">
                                <span class="input-group-text bg-light" style="width: 140px; justify-content: flex-end;">[[ baseField ]]</span>
                                <input type="text" class="form-control" v-model="table.fields[baseField]">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue

createApp({
    compilerOptions: {
        delimiters: ['[[', ']]']
    },
    data() {
        return {
            tables: {},
            loading: true,
            saving: false
        }
    },
    methods: {
        async fetchConfig() {
            try {
                const res = await fetch('/api/config/tables');
                const data = await res.json();
                if (res.ok) {
                    this.tables = data.tables;
                } else {
                    alert('获取配置失败: ' + data.error);
                }
            } catch (e) {
                alert('获取配置出错: ' + e);
            } finally {
                this.loading = false;
            }
        },
        async saveConfig() {
            if (!confirm('确定保存并更新数据库表结构吗？这可能会修改现有表！')) return;
            
            this.saving = true;
            try {
                const res = await fetch('/api/config/tables', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tables: this.tables })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('保存成功！');
                    this.fetchConfig(); // reload
                } else {
                    alert('保存失败: ' + data.error);
                }
            } catch (e) {
                alert('保存出错: ' + e);
            } finally {
                this.saving = false;
            }
        }
    },
    mounted() {
        this.fetchConfig();
    }
}).mount('#app')
</script>
{% endblock %}
